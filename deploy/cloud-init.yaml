#cloud-config
# Covenant Sentinel — Vultr instance bootstrap (Ubuntu 24.04).
# Injected as user_data by deploy/vultr-deploy.sh, which substitutes __INFERENCE_KEY__.

package_update: true
packages:
  - git
  - curl

write_files:
  - path: /etc/systemd/system/covenant-sentinel.service
    content: |
      [Unit]
      Description=Covenant Sentinel (Next.js standalone)
      After=network-online.target
      Wants=network-online.target

      [Service]
      WorkingDirectory=/opt/covenant-sentinel/.next/standalone
      Environment=NODE_ENV=production
      Environment=PORT=80
      Environment=HOSTNAME=0.0.0.0
      ExecStart=/usr/bin/node server.js
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

  - path: /opt/bootstrap.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -x
      export NODE_OPTIONS=--max-old-space-size=3072
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs
      git clone https://github.com/tuttop13/covenant-sentinel.git /opt/covenant-sentinel
      cd /opt/covenant-sentinel
      echo "VULTR_INFERENCE_API_KEY=__INFERENCE_KEY__" > .env.local
      npm ci
      npm run build
      # standalone bundle needs static assets, data and env next to server.js
      cp -r .next/static .next/standalone/.next/static
      cp -r data .next/standalone/data
      cp .env.local .next/standalone/.env.local
      # This Vultr Ubuntu image ships ufw active with only SSH open — allow HTTP.
      ufw allow 80/tcp || true
      ufw reload || true
      systemctl daemon-reload
      systemctl enable --now covenant-sentinel
      echo "BOOTSTRAP_DONE"

runcmd:
  - bash /opt/bootstrap.sh > /var/log/covenant-bootstrap.log 2>&1
